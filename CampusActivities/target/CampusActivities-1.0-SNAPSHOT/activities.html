<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USC FIT - Activities</title>
    <style>
        :root {
            --usc-cardinal: #992233;
            --usc-gold: #FFCC00;
            --bg-dark: #121212;
            --card-white: #ffffff;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 2px, transparent 2px, transparent 10px);
            margin: 0;
            min-height: 100vh;
            color: white;
            padding: 24px 18px 40px;
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 18px;
        }

        .header h1 {
            color: var(--usc-gold);
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .header p {
            font-size: 10px;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar .title {
            font-size: 20px;
            font-weight: 700;
        }

        .toolbar a {
            text-decoration: none;
            background-color: var(--usc-cardinal);
            color: white;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 700;
            font-size: 14px;
        }

        .card {
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.45);
            color: var(--text-main);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            font-size: 12px;
            letter-spacing: .4px;
            color: var(--text-muted);
            background: #fafafa;
            border-bottom: 1px solid #ececec;
            padding: 12px 14px;
        }

        tbody td {
            padding: 13px 14px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        #emptyState {
            display: none;
            padding: 18px 14px;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>USC FIT</h1>
            <p>Campus Fitness Platform</p>
        </div>

        <div class="toolbar">
            <div class="title">Campus Activities</div>
            <a href="createEvent.html">Create Event</a>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr><th>Activity</th><th>Location</th><th>Date</th><th>Time</th><th>Spots</th></tr>
                </thead>
                <tbody id="eventsBody"></tbody>
            </table>
            <div id="emptyState">No events yet. Be the first to create one.</div>
        </div>
    </div>

    <script src="activities.js"></script>
</body>
</html>
