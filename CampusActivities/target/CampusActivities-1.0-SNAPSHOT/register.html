<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USC FIT - Register</title>
    <style>
        :root {
            --usc-cardinal: #992233;
            --usc-gold: #FFCC00;
            --bg-dark: #121212;
            --card-white: #ffffff;
            --input-bg: #f8f8f8;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            /* This creates that subtle diagonal line pattern from your image */
            background-image: repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 2px, transparent 2px, transparent 10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--usc-gold);
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .header p {
            font-size: 10px;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .card {
            background: var(--card-white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            color: var(--text-main);
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 22px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: var(--input-bg);
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            font-size: 14px;
        }

        /* Validation Styles */
        input[type="email"]:invalid:not(:placeholder-shown) { border: 2px solid #ff4444; }
        input[type="email"]:valid { border: 1px solid #ddd; }

        .error-text { color: #ff4444; font-size: 11px; margin-top: 4px; }

        input[type="submit"] {
            width: 100%;
            background-color: var(--usc-cardinal);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        input[type="submit"]:hover { opacity: 0.9; }
        input[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--usc-cardinal);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>USC FIT</h1>
        <p>Campus Fitness Platform</p>
    </div>

    <div class="card">
        <h2>Create Account</h2>
        <p class="subtitle">Join the Trojan fitness community</p>

        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group">
                <label>USC Email</label>
                <input type="email" name="email" id="emailInput" pattern=".*@usc\.edu$" placeholder="username@usc.edu" required>
                <p id="emailError" class="error-text"></p>
            </div>

            <div class="form-group">
                <label>Interests</label>
                <input type="text" name="interests" placeholder="e.g., basketball, swimming">
            </div>

            <div class="form-group">
                <label>Skill Level</label>
                <select name="skillLevel">
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="competitive">Competitive</option>
                </select>
            </div>

            <input type="submit" value="Register" id="submitBtn">
        </form>

        <p id="error" style="color:red; font-size: 12px; text-align: center;"></p>
        
        <div class="footer-link">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
