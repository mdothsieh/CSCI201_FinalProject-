<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USC FIT - Dashboard</title>
    <style>
        :root {
            --usc-cardinal: #992233;
            --usc-gold: #FFCC00;
            --bg-dark: #121212;
            --card-white: #ffffff;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 2px, transparent 2px, transparent 10px);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--usc-gold);
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .header p {
            font-size: 10px;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            padding: 32px;
            color: var(--text-main);
        }

        .welcome {
            margin: 0 0 6px 0;
            font-size: 24px;
        }

        .subtitle {
            margin: 0 0 24px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .menu {
            display: grid;
            gap: 12px;
        }

        .menu a {
            text-decoration: none;
            background-color: #f6f6f6;
            color: var(--text-main);
            border: 1px solid #e7e7e7;
            border-radius: 8px;
            padding: 12px 14px;
            font-weight: 600;
            transition: transform 0.15s, border-color 0.15s;
        }

        .menu a:hover {
            transform: translateY(-1px);
            border-color: #d6d6d6;
        }

        .menu a.primary {
            background-color: var(--usc-cardinal);
            color: white;
            border-color: var(--usc-cardinal);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>USC FIT</h1>
        <p>Campus Fitness Platform</p>
    </div>

    <div class="card">
        <h2 class="welcome">Welcome, <span id="username"></span></h2>
        <p class="subtitle">Manage your activity schedule and events.</p>

        <div class="menu">
            <a class="primary" href="activities.html">Browse Activities</a>
            <a href="createEvent.html">Create Event</a>
            <a href="matching.html">Find Matches</a>
            <a href="#" id="logoutLink">Logout</a>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
